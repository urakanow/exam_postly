name: Deploy React to GitHub Pages

on:
  push:
    branches:
      - main  # Runs when `main` branch is updated

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: exam_postly.client
        run: npm install


      - name: Build React App
        working-directory: exam_postly.client
        run: npm run build


      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: exam_postly.client/dist
          clean: true  # Force updates by cleaning old files
          force: true  # Force push to override any cached states
