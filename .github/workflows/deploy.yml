name: Deploy ASP.NET Core to Somee.com

on:
  push:
    branches:
      - main  # Runs only when `main` is updated
permissions:
  contents: write

jobs:
  backend-deploy:
    runs-on: ubuntu-latest

    env:
     ASPNETCORE_ENVIRONMENT: Production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build and Publish
        run: dotnet publish -c Release -o published_app

      # Stop IIS to release file locks
      - name: Stop IIS by renaming web.config
        run: mv published_app/web.config published_app/web.config.bak

      - name: Upload to Somee.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: published_app/
          server-dir: /www.exam-postly.somee.com/
          delete: true #uhkjhk
          passive: true  # Ensures a more stable connection

      # Restart IIS after deployment
      - name: Restore web.config to restart IIS
        run: mv published_app/web.config.bak published_app/web.config

  frontend-deploy:
    runs-on: ubuntu-latest
    needs: backend-deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: exam_postly.client
        run: npm install

      - name: Build React App
        working-directory: exam_postly.client
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: exam_postly.client/dist
          clean: true
          force: true
