name: Deploy ASP.NET Core to Somee.com

on:
  push:
    branches:
      - main  # Runs only when `main` is updated

jobs:
  backend-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build and Publish
        run: dotnet publish -c Release -o published_app

      - name: Upload to Somee.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: published_app/
          server-dir: /www.exam-postly.somee.com/ # Change if Somee.com requires a different folder
          dangerous-clean-slate: true
  frontend-deploy:
    runs-on: ubuntu-latest
    needs: backend-deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: exam_postly.client
        run: npm install


      - name: Build React App
        working-directory: exam_postly.client
        run: npm run build


      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: exam_postly.client/dist
          clean: true  # Force updates by cleaning old files
          force: true  # Force push to override any cached states
